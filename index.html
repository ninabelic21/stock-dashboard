document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a48ffeeaa\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>body{margin:0;background:linear-gradient(160deg,#131711 0%,#0C0F0C 40%,#0E120D 100%);min-height:100vh;font-family:'Instrument Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased}button{font-family:'Instrument Sans',sans-serif}<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;max-width:1240px;margin:0 auto;padding:0 36px 60px\">\n\n  <!-- top nav -->\n  <div style=\"display:flex;justify-content:space-between;align-items:center;padding:26px 0 22px\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <div style=\"width:30px;height:30px;border-radius:10px;background:#3FE0B0;display:flex;align-items:center;justify-content:center;color:#10140E;font-size:15px;font-weight:700\">V<\u002Fdiv>\n      <div style=\"font-weight:600;font-size:15px;color:#F2F4EF;letter-spacing:-0.01em\">Vermögen<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:4px;backdrop-filter:blur(12px)\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"2\">\n        <button onclick=\"{{ t.onClick }}\" style=\"border:none;cursor:pointer;font-size:13px;font-weight:600;padding:8px 20px;border-radius:9px;background:{{ t.bg }};color:{{ t.color }}\">{{ t.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div style=\"width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:#F2F4EF;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;backdrop-filter:blur(12px)\">L<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ OVERVIEW ============ -->\n  <sc-if value=\"{{ isOverview }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <!-- hero -->\n      <div style=\"padding:8px 0 26px;border-bottom:1px solid rgba(255,255,255,.09)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7E8A7C;font-weight:600\">Gesamtwert · EUR<\u002Fdiv>\n            <div style=\"display:flex;align-items:baseline;gap:16px;margin-top:10px\">\n              <span style=\"font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:46px;line-height:1.05;color:#F2F4EF;letter-spacing:-0.02em\">{{ totalFmt }}<\u002Fspan>\n              <span style=\"display:inline-flex;align-items:center;gap:6px;background:rgba(70,224,138,.12);border:1px solid rgba(70,224,138,.3);color:#46E08A;border-radius:99px;padding:4px 12px;font-family:'Spline Sans Mono',monospace;font-size:12.5px;font-weight:600\">↗ {{ dayPctFmt }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:12px;margin-top:12px;font-size:13px;align-items:baseline;color:#7E8A7C\">\n              <span style=\"font-family:'Spline Sans Mono',monospace;font-weight:600;color:{{ dayColor }}\">{{ dayChangeFmt }}<\u002Fspan>\n              <span>heute<\u002Fspan><span style=\"color:#3A423A\">·<\u002Fspan>\n              <span>{{ rangeLabel }}<\u002Fspan>\n              <span style=\"font-family:'Spline Sans Mono',monospace;font-weight:600;color:#3FE0B0\">{{ rangePctFmt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:4px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:4px\">\n            <sc-for list=\"{{ rangeBtns }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ r.onClick }}\" style=\"border:none;cursor:pointer;font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;background:{{ r.bg }};color:{{ r.color }}\">{{ r.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 1080 170\" preserveAspectRatio=\"none\" style=\"width:100%;height:170px;margin-top:16px;display:block\">\n          <path d=\"{{ areaPath }}\" fill=\"#3FE0B0\" opacity=\"0.06\"><\u002Fpath>\n          <path d=\"{{ chartPath }}\" fill=\"none\" stroke=\"#3FE0B0\" stroke-width=\"2\" stroke-linejoin=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpath>\n        <\u002Fsvg>\n        <div style=\"display:flex;justify-content:space-between;margin-top:8px\">\n          <sc-for list=\"{{ axisLabels }}\" as=\"ax\" hint-placeholder-count=\"5\">\n            <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#5E685C\">{{ ax.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- movers strip -->\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px\">\n        <sc-for list=\"{{ movers }}\" as=\"m\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ m.onClick }}\" style=\"border-left:1px solid rgba(255,255,255,.12);padding:6px 0 6px 18px;cursor:pointer\" style-hover=\"border-left-color:rgba(63,224,176,.7)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center\">\n              <span style=\"font-family:'Spline Sans Mono',monospace;font-size:12.5px;font-weight:600;color:#F2F4EF\">{{ m.ticker }}<\u002Fspan>\n              <span style=\"font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:{{ m.tagColor }};background:{{ m.tagBg }};border-radius:99px;padding:3px 9px\">{{ m.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:21px;font-weight:600;color:{{ m.pctColor }};margin-top:8px\">{{ m.pct }}<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#7E8A7C;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ m.note }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:grid;grid-template-columns:1fr 330px;gap:16px;align-items:start\">\n        <!-- holdings -->\n        <div style=\"padding:6px 0 8px\">\n          <div style=\"display:flex;justify-content:space-between;align-items:center;padding:16px 0 12px\">\n            <div style=\"font-size:13px;font-weight:700;color:#F2F4EF\">Positionen<\u002Fdiv>\n            <div style=\"display:flex;gap:14px\">\n              <button onclick=\"{{ sortByWeight }}\" style=\"border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:{{ sortWeightColor }};padding:0\">Nach Anteil<\u002Fbutton>\n              <button onclick=\"{{ sortByDay }}\" style=\"border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:{{ sortDayColor }};padding:0\">Nach Bewegung<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;padding:0 0 10px;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#5E685C;font-weight:600;border-bottom:1px solid rgba(255,255,255,.06)\">\n            <span>Position<\u002Fspan><span style=\"text-align:right\">Wert<\u002Fspan><span style=\"text-align:right\">Heute<\u002Fspan><span style=\"text-align:right\">Anteil<\u002Fspan>\n          <\u002Fdiv>\n          <sc-for list=\"{{ holdings }}\" as=\"h\" hint-placeholder-count=\"8\">\n            <div onclick=\"{{ h.onClick }}\" style=\"display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;align-items:center;padding:13px 0;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06)\" style-hover=\"background:rgba(255,255,255,.04)\">\n              <div style=\"display:flex;align-items:center;gap:12px\">\n                <div style=\"width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:{{ h.chipFg }};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:none;font-family:'Spline Sans Mono',monospace\">{{ h.ticker }}<\u002Fdiv>\n                <div><div style=\"font-size:14px;font-weight:600;color:#F2F4EF\">{{ h.name }}<\u002Fdiv><div style=\"font-size:11.5px;color:#7E8A7C\">{{ h.sector }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13.5px;color:#D9DED6\">{{ h.valueFmt }}<\u002Fdiv>\n              <div style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13.5px;font-weight:600;color:{{ h.dayColor }}\">{{ h.dayFmt }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:center;justify-content:flex-end;gap:9px\">\n                <div style=\"width:50px;height:5px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:#3FE0B0;width:{{ h.weightBar }}\"><\u002Fdiv><\u002Fdiv>\n                <span style=\"font-family:'Spline Sans Mono',monospace;font-size:12.5px;color:#98A295;width:54px;text-align:right;white-space:nowrap\">{{ h.weightFmt }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- rail -->\n        <div style=\"display:flex;flex-direction:column;gap:16px\">\n          <div style=\"padding:16px 0 24px 28px;border-left:1px solid rgba(255,255,255,.12)\">\n            <div style=\"font-size:13px;font-weight:700;color:#F2F4EF;margin-bottom:16px\">Aufteilung<\u002Fdiv>\n            <div style=\"display:flex;height:9px;border-radius:5px;overflow:hidden;gap:2px\">\n              <sc-for list=\"{{ alloc }}\" as=\"a\" hint-placeholder-count=\"5\">\n                <div style=\"width:{{ a.width }};background:{{ a.color }}\"><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:16px\">\n              <sc-for list=\"{{ alloc }}\" as=\"a\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:9px;font-size:12.5px\"><div style=\"width:9px;height:9px;border-radius:3px;background:{{ a.color }};flex:none\"><\u002Fdiv><span style=\"color:#B9C1B6;flex:1\">{{ a.label }}<\u002Fspan><span style=\"font-family:'Spline Sans Mono',monospace;color:#98A295;white-space:nowrap\">{{ a.pct }}<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:16px 0 24px 28px;border-left:1px solid rgba(63,224,176,.4)\">\n            <div style=\"font-size:13px;font-weight:700;color:#3FE0B0;margin-bottom:14px;display:flex;align-items:center;gap:8px\"><span style=\"width:7px;height:7px;border-radius:50%;background:#3FE0B0\"><\u002Fspan>Vorschläge<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <sc-for list=\"{{ suggestions }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ s.onClick }}\" style=\"cursor:pointer\" style-hover=\"opacity:.85\">\n                  <div style=\"font-size:12.5px;font-weight:600;color:{{ s.titleColor }}\">{{ s.title }}<\u002Fdiv>\n                  <div style=\"font-size:12px;line-height:1.55;color:#98A295;margin-top:4px\">{{ s.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ DETAIL ============ -->\n  <sc-if value=\"{{ isDetail }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;flex-direction:column;gap:16px\">\n      <button onclick=\"{{ goBack }}\" style=\"align-self:flex-start;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;color:#98A295;display:flex;align-items:center;gap:7px;padding:2px 0\" style-hover=\"color:#3FE0B0\">← Zurück zum Portfolio<\u002Fbutton>\n      <div style=\"padding:8px 0 26px;border-bottom:1px solid rgba(255,255,255,.09)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start\">\n          <div style=\"display:flex;align-items:center;gap:16px\">\n            <div style=\"width:48px;height:48px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:{{ det.chipFg }};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;font-family:'Spline Sans Mono',monospace\">{{ det.ticker }}<\u002Fdiv>\n            <div>\n              <div style=\"font-size:24px;font-weight:600;color:#F2F4EF;line-height:1.1;letter-spacing:-0.01em\">{{ det.name }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#7E8A7C;margin-top:3px\">{{ det.sector }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:4px;background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:4px\">\n            <sc-for list=\"{{ rangeBtns }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ r.onClick }}\" style=\"border:none;cursor:pointer;font-size:12px;font-weight:600;padding:6px 14px;border-radius:8px;background:{{ r.bg }};color:{{ r.color }}\">{{ r.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:14px;margin-top:22px\">\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:38px;color:#F2F4EF\">{{ det.priceFmt }}<\u002Fspan>\n          <span style=\"font-family:'Spline Sans Mono',monospace;font-size:15px;font-weight:600;color:{{ det.dayColor }}\">{{ det.dayFmt }}<\u002Fspan>\n          <span style=\"font-size:12.5px;color:#7E8A7C\">heute<\u002Fspan>\n        <\u002Fdiv>\n        <svg viewBox=\"0 0 1080 200\" preserveAspectRatio=\"none\" style=\"width:100%;height:200px;margin-top:14px;display:block\">\n          <path d=\"{{ det.areaPath }}\" fill=\"{{ det.chartColor }}\" opacity=\"0.07\"><\u002Fpath>\n          <path d=\"{{ det.chartPath }}\" fill=\"none\" stroke=\"{{ det.chartColor }}\" stroke-width=\"2\" stroke-linejoin=\"round\" vector-effect=\"non-scaling-stroke\"><\u002Fpath>\n        <\u002Fsvg>\n        <div style=\"display:flex;justify-content:space-between;margin-top:8px\">\n          <sc-for list=\"{{ axisLabels }}\" as=\"ax\" hint-placeholder-count=\"5\">\n            <span style=\"font-family:'Spline Sans Mono',monospace;font-size:10.5px;color:#5E685C\">{{ ax.label }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px\">\n        <sc-for list=\"{{ det.stats }}\" as=\"st\" hint-placeholder-count=\"5\">\n          <div style=\"border-left:1px solid rgba(255,255,255,.12);padding:6px 0 6px 18px\">\n            <div style=\"font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#5E685C;font-weight:600\">{{ st.label }}<\u002Fdiv>\n            <div style=\"font-family:'Spline Sans Mono',monospace;font-size:17px;font-weight:600;color:{{ st.color }};margin-top:7px;white-space:nowrap\">{{ st.value }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"padding-top:8px\">\n        <div style=\"font-size:13px;font-weight:700;color:#F2F4EF;padding-bottom:4px\">Nachrichten<\u002Fdiv>\n        <sc-if value=\"{{ det.hasNews }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-for list=\"{{ det.news }}\" as=\"n\" hint-placeholder-count=\"2\">\n            <div style=\"display:flex;gap:16px;align-items:baseline;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06)\">\n              <span style=\"font-family:'Spline Sans Mono',monospace;font-size:11.5px;color:#5E685C;flex:none;width:44px\">{{ n.date }}<\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-size:13.5px;font-weight:600;color:#D9DED6;line-height:1.45\">{{ n.title }}<\u002Fdiv><div style=\"font-size:11.5px;color:#5E685C;margin-top:3px\">{{ n.source }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ det.noNews }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:12.5px;color:#5E685C;padding:10px 0;line-height:1.5\">Noch keine Schlagzeilen — Cowork kann hier aktuelle Nachrichten zu dieser Position eintragen.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <sc-if value=\"{{ det.hasNote }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"border-left:1px solid rgba(63,224,176,.4);padding:6px 0 6px 20px;display:flex;gap:12px;align-items:baseline\">\n          <span style=\"width:7px;height:7px;border-radius:50%;background:#3FE0B0;flex:none;position:relative;top:-2px\"><\u002Fspan>\n          <div><span style=\"font-size:13px;font-weight:700;color:#3FE0B0\">{{ det.noteTitle }}<\u002Fspan><span style=\"font-size:13px;line-height:1.6;color:#98A295\"> — {{ det.noteBody }}<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ WATCHLIST ============ -->\n  <sc-if value=\"{{ isWatchlist }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"padding:10px 0\">\n      <div style=\"display:flex;justify-content:space-between;align-items:center;padding:18px 0 14px\">\n        <div style=\"font-size:13px;font-weight:700;color:#F2F4EF\">Watchlist<\u002Fdiv>\n        <div style=\"display:flex;gap:8px;align-items:center\">\n          <input value=\"{{ watchQ }}\" onchange=\"{{ onWatchQ }}\" onkeydown=\"{{ onWatchKey }}\" placeholder=\"Ticker + Name, z.B. AAPL Apple\" style=\"width:260px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:8px 12px;font-family:'Instrument Sans',sans-serif;font-size:13px;color:#F2F4EF;outline:none\" style-focus=\"border-color:rgba(63,224,176,.6)\">\n          <button onclick=\"{{ addWatch }}\" style=\"border:none;cursor:pointer;font-size:13px;font-weight:600;padding:8px 16px;border-radius:9px;background:rgba(63,224,176,.9);color:#10140E\" style-hover=\"background:#3FE0B0\">+ Hinzufügen<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ watchlist }}\" as=\"w\" hint-placeholder-count=\"5\">\n        <div style=\"display:grid;grid-template-columns:2fr 1fr 1fr 1fr;align-items:center;padding:14px 0;border-top:1px solid rgba(255,255,255,.06)\" style-hover=\"background:rgba(255,255,255,.04)\">\n          <div style=\"display:flex;align-items:center;gap:12px\">\n            <span style=\"font-family:'Spline Sans Mono',monospace;font-size:12px;font-weight:600;color:#7E8A7C;width:52px\">{{ w.ticker }}<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:600;color:#F2F4EF\">{{ w.name }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13.5px;color:#D9DED6\">{{ w.priceFmt }}<\u002Fdiv>\n          <div style=\"text-align:right;font-family:'Spline Sans Mono',monospace;font-size:13.5px;font-weight:600;color:{{ w.color }}\">{{ w.pct }}<\u002Fdiv>\n          <div style=\"display:flex;justify-content:flex-end;align-items:center;gap:14px\"><svg viewBox=\"0 0 120 32\" style=\"width:110px;height:32px\"><path d=\"{{ w.spark }}\" fill=\"none\" stroke=\"{{ w.sparkColor }}\" stroke-width=\"1.8\"><\u002Fpath><\u002Fsvg><button onclick=\"{{ w.onRemove }}\" title=\"Entfernen\" style=\"border:none;background:transparent;cursor:pointer;color:#5E685C;font-size:15px;line-height:1;padding:4px\" style-hover=\"color:#F07A5E\">×<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { view: 'overview', tab: 'portfolio', sel: null, range: '1M', sort: 'weight', q: '', watch: [\n    { ticker: 'ASML', name: 'ASML Holding', price: 812.40, day: 1.1, seed: 29 },\n    { ticker: 'NOVO', name: 'Novo Nordisk', price: 92.15, day: -0.8, seed: 31 },\n    { ticker: 'BRK.B', name: 'Berkshire Hathaway', price: 428.60, day: 0.3, seed: 37 },\n    { ticker: 'ADBE', name: 'Adobe', price: 471.20, day: 0.6, seed: 41 },\n    { ticker: 'AIR', name: 'Airbus', price: 168.90, day: -0.2, seed: 43 }\n  ] };\n\n  data() {\n    return [\n      { ticker: 'IWDA', name: 'iShares Core MSCI World', sector: 'ETF · Welt', value: 28400, day: 0.4, cost: 24100, shares: 312, price: 91.03, seed: 3, target: 40 },\n      { ticker: 'VUSA', name: 'Vanguard S&P 500', sector: 'ETF · USA', value: 14200, day: 0.6, cost: 11900, shares: 152, price: 93.42, seed: 7, target: 20 },\n      { ticker: 'NVDA', name: 'NVIDIA', sector: 'Halbleiter', value: 9850, day: 2.8, cost: 5200, shares: 78, price: 126.28, seed: 11, target: 8 },\n      { ticker: 'MSFT', name: 'Microsoft', sector: 'Software', value: 7300, day: 0.9, cost: 6100, shares: 17, price: 429.41, seed: 5, target: 8 },\n      { ticker: 'LLY', name: 'Eli Lilly', sector: 'Pharma', value: 5900, day: -1.2, cost: 6300, shares: 8, price: 737.50, seed: 13, target: 8 },\n      { ticker: 'WMT', name: 'Walmart', sector: 'Einzelhandel', value: 4100, day: 0.2, cost: 3600, shares: 44, price: 93.18, seed: 17, target: 6 },\n      { ticker: 'BSX', name: 'Boston Scientific', sector: 'Medizintechnik', value: 3650, day: -0.5, cost: 3200, shares: 42, price: 86.90, seed: 19, target: 5 },\n      { ticker: 'MPWR', name: 'Monolithic Power', sector: 'Halbleiter', value: 2950, day: -3.4, cost: 3400, shares: 4, price: 737.50, seed: 23, target: 5 }\n    ];\n  }\n\n  // Cowork: update these headlines per ticker (newest first). Format: { date: 'DD.MM.', source: '...', title: '...' }\n  newsData() {\n    return {\n      NVDA: [\n        { date: '02.07.', source: 'Beispiel-Quelle', title: 'Nvidia stellt neue Chip-Generation für Rechenzentren vor' },\n        { date: '30.06.', source: 'Beispiel-Quelle', title: 'Analysten heben Kursziele nach starkem Quartal an' }\n      ],\n      MPWR: [\n        { date: '03.07.', source: 'Beispiel-Quelle', title: 'Monolithic Power fällt nach vorsichtigem Ausblick' }\n      ],\n      LLY: [\n        { date: '01.07.', source: 'Beispiel-Quelle', title: 'Eli Lilly meldet Studiendaten zu neuem Medikament' }\n      ],\n      MSFT: [\n        { date: '29.06.', source: 'Beispiel-Quelle', title: 'Microsoft erweitert KI-Angebot für Unternehmenskunden' }\n      ]\n    };\n  }\n\n  rnd(seed) { let s = seed; return () => { s = (s * 16807) % 2147483647; return (s % 1000) / 1000; }; }\n  series(seed, n, drift) { const r = this.rnd(seed); const pts = []; let v = 100; for (let i = 0; i < n; i++) { v += (r() - 0.48) * 3 + drift; pts.push(v); } return pts; }\n  toPath(pts, w, h, pad) { pad = pad || 5; const min = Math.min(...pts), max = Math.max(...pts), span = max - min || 1; return pts.map((p, i) => (i ? 'L' : 'M') + (i / (pts.length - 1) * w).toFixed(1) + ' ' + (pad + (1 - (p - min) / span) * (h - pad * 2)).toFixed(1)).join(' '); }\n  eur(v) { return '€' + v.toLocaleString('de-DE'); }\n  eur2(v) { return '€' + v.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }\n  pct(v, sign) { return (sign && v > 0 ? '+' : '') + v.toLocaleString('de-DE', { minimumFractionDigits: 1, maximumFractionDigits: 1 }) + ' %'; }\n\n  axisLabels(key) {\n    const now = new Date();\n    const fmt = (d, opts) => d.toLocaleDateString('de-DE', opts);\n    const back = (days) => new Date(now.getTime() - days * 86400000);\n    if (key === '1T') return ['9:00', '11:00', '13:00', '15:00', '17:30'];\n    if (key === '1W') { const out = []; for (let i = 6; i >= 0; i -= 2) out.push(fmt(back(i), { weekday: 'short' })); return out; }\n    if (key === '1M') { const out = []; for (let i = 28; i >= 0; i -= 7) out.push(fmt(back(i), { day: 'numeric', month: 'short' })); return out; }\n    if (key === '3M') { const out = []; for (let i = 90; i >= 0; i -= 30) out.push(fmt(back(i), { day: 'numeric', month: 'short' })); return out; }\n    if (key === '1J') { const out = []; for (let i = 12; i >= 0; i -= 2) { const d = new Date(now.getFullYear(), now.getMonth() - i, 1); out.push(fmt(d, { month: 'short', year: '2-digit' })); } return out; }\n    const y = now.getFullYear(); return [String(y - 4), String(y - 3), String(y - 2), String(y - 1), String(y)];\n  }\n\n  renderVals() {\n    const GREEN = '#46E08A', RED = '#F07A5E', LIME = '#3FE0B0';\n    const raw = this.data();\n    const total = raw.reduce((a, h) => a + h.value, 0);\n    const dayChange = raw.reduce((a, h) => a + h.value * h.day / 100, 0);\n    const ranges = { '1T': { n: 24, d: 0.03, pct: 0.6, label: '1 Tag' }, '1W': { n: 7, d: 0.1, pct: 1.2, label: '1 Woche' }, '1M': { n: 30, d: 0.15, pct: 3.4, label: '1 Monat' }, '3M': { n: 60, d: 0.2, pct: 7.1, label: '3 Monate' }, '1J': { n: 52, d: 0.3, pct: 14.8, label: '1 Jahr' }, 'Max': { n: 80, d: 0.4, pct: 31.5, label: 'Gesamt' } };\n    const R = ranges[this.state.range];\n    const pts = this.series(41 + R.n, R.n, R.d);\n    const chartPath = this.toPath(pts, 1080, 170, 8);\n\n    const rangeBtns = Object.keys(ranges).map(k => {\n      const active = k === this.state.range;\n      return { label: k, onClick: () => this.setState({ range: k }), bg: active ? 'rgba(63,224,176,.9)' : 'transparent', color: active ? '#10140E' : '#7E8A7C' };\n    });\n\n    const chips = { IWDA: GREEN, VUSA: GREEN, NVDA: LIME, MSFT: '#7FB8E8', LLY: '#F0A05E', WMT: '#A8D96C', BSX: '#6CD9C8', MPWR: '#E8C77F' };\n    const notes = {\n      NVDA: ['Übergewichtet', 'NVDA ist 12,9 % des Portfolios, Ziel 8 %. Ein Verkauf von ~€3.700 würde rebalancieren.'],\n      MPWR: ['Starker Beweger', 'Heute −3,4 % — größter Tagesverlust im Portfolio. Nachrichten prüfen.']\n    };\n\n    let holdings = raw.map(h => {\n      const pl = h.value - h.cost, w = h.value / total * 100;\n      return {\n        ...h,\n        onClick: () => this.setState({ view: 'detail', sel: h.ticker }),\n        chipFg: chips[h.ticker],\n        valueFmt: this.eur(h.value), dayFmt: this.pct(h.day, true),\n        dayColor: h.day >= 0 ? GREEN : RED,\n        weightFmt: this.pct(w), weightBar: Math.min(100, w * 2.6) + '%',\n        pl, weight: w\n      };\n    });\n    holdings = [...holdings].sort((a, b) => this.state.sort === 'day' ? b.day - a.day : b.value - a.value);\n\n    const byDay = [...holdings].sort((a, b) => b.day - a.day);\n    const movers = [\n      { h: byDay[0], tag: 'Top' }, { h: byDay[1], tag: 'Top' },\n      { h: byDay[byDay.length - 1], tag: 'Flop' }, { h: byDay[byDay.length - 2], tag: 'Flop' }\n    ].map(({ h, tag }) => ({\n      ticker: h.ticker, pct: this.pct(h.day, true), note: h.name, tag,\n      tagColor: tag === 'Top' ? '#10140E' : '#F2F4EF',\n      tagBg: tag === 'Top' ? 'rgba(63,224,176,.85)' : 'rgba(240,122,94,.25)',\n      pctColor: h.day >= 0 ? GREEN : RED,\n      onClick: () => this.setState({ view: 'detail', sel: h.ticker })\n    }));\n\n    const allocData = [\n      { label: 'ETFs Welt/USA', v: 42600, color: '#3FE0B0' },\n      { label: 'Halbleiter', v: 12800, color: '#8E9FE8' },\n      { label: 'Software', v: 7300, color: '#7FB8E8' },\n      { label: 'Gesundheit', v: 9550, color: '#F0A05E' },\n      { label: 'Einzelhandel', v: 4100, color: '#6CD9C8' }\n    ];\n    const alloc = allocData.map(a => ({ label: a.label, color: a.color, pct: this.pct(a.v / total * 100), width: (a.v / total * 100).toFixed(1) + '%' }));\n\n    const suggestions = [\n      { title: 'NVIDIA übergewichtet', titleColor: LIME, body: 'NVDA ist 12,9 % des Portfolios, Ziel 8 %. Ein Verkauf von ~€3.700 würde rebalancieren.', t: 'NVDA' },\n      { title: 'Halbleiter-Klumpen', titleColor: LIME, body: 'NVDA + MPWR = 16,8 % in einem Sektor. Streuung über den Welt-ETF erhöhen.', t: 'NVDA' },\n      { title: 'Starker Beweger: MPWR', titleColor: RED, body: 'Monolithic Power heute −3,4 % — größter Tagesverlust. Nachrichten prüfen.', t: 'MPWR' }\n    ].map(s => ({ ...s, onClick: () => this.setState({ view: 'detail', sel: s.t }) }));\n\n    let det = null;\n    const selH = holdings.find(h => h.ticker === this.state.sel);\n    if (selH) {\n      const dpts = this.series(selH.seed + R.n, R.n, R.d + selH.day / 10);\n      const dPath = this.toPath(dpts, 1080, 200, 8);\n      const note = notes[selH.ticker];\n      det = {\n        ...selH,\n        priceFmt: this.eur2(selH.price),\n        chartColor: selH.day >= 0 ? LIME : RED,\n        chartPath: dPath, areaPath: dPath + ' L1080 200 L0 200 Z',\n        stats: [\n          { label: 'Wert', value: this.eur(selH.value), color: '#F2F4EF' },\n          { label: 'Stück', value: String(selH.shares), color: '#F2F4EF' },\n          { label: 'Einstand', value: this.eur(selH.cost), color: '#F2F4EF' },\n          { label: 'G/V gesamt', value: (selH.pl >= 0 ? '+' : '−') + this.eur(Math.abs(selH.pl)).slice(1) + ' €', color: selH.pl >= 0 ? GREEN : RED },\n          { label: 'Anteil / Ziel', value: this.pct(selH.weight) + ' / ' + selH.target + ' %', color: selH.weight > selH.target + 2 ? LIME : '#F2F4EF' }\n        ],\n        hasNote: !!note,\n        noteTitle: note ? note[0] : '', noteBody: note ? note[1] : '',\n        news: this.newsData()[selH.ticker] || [],\n        hasNews: (this.newsData()[selH.ticker] || []).length > 0,\n        noNews: (this.newsData()[selH.ticker] || []).length === 0\n      };\n    }\n\n    const addWatch = () => {\n      const q = this.state.q.trim();\n      if (!q) return;\n      let hash = 0;\n      for (let i = 0; i < q.length; i++) hash = (hash * 31 + q.charCodeAt(i)) % 9973;\n      const parts = q.split(/\\s+/);\n      const ticker = parts[0].toUpperCase().slice(0, 6);\n      if (this.state.watch.some(w => w.ticker === ticker)) { this.setState({ q: '' }); return; }\n      const name = parts.length > 1 ? parts.slice(1).join(' ') : ticker.charAt(0) + ticker.slice(1).toLowerCase();\n      this.setState({\n        watch: [...this.state.watch, { ticker, name, price: 40 + hash % 800 + (hash % 100) / 100, day: ((hash % 61) - 30) / 10, seed: 7 + hash % 97 }],\n        q: ''\n      });\n    };\n    const watchlist = this.state.watch.map(w => ({\n      ...w,\n      priceFmt: this.eur2(w.price),\n      pct: this.pct(w.day, true),\n      color: w.day >= 0 ? GREEN : RED,\n      sparkColor: w.day >= 0 ? GREEN : RED,\n      spark: this.toPath(this.series(w.seed, 30, w.day / 8), 120, 32, 3),\n      onRemove: (e) => { e.stopPropagation(); this.setState({ watch: this.state.watch.filter(x => x.ticker !== w.ticker) }); }\n    }));\n\n    const view = this.state.tab === 'watchlist' ? 'watchlist' : this.state.view;\n    return {\n      isOverview: view === 'overview', isDetail: view === 'detail' && !!det, isWatchlist: view === 'watchlist',\n      tabs: [\n        { label: 'Portfolio', key: 'portfolio' }, { label: 'Watchlist', key: 'watchlist' }\n      ].map(t => ({ ...t, onClick: () => this.setState({ tab: t.key, view: 'overview' }), bg: this.state.tab === t.key ? 'rgba(63,224,176,.9)' : 'transparent', color: this.state.tab === t.key ? '#10140E' : '#98A295' })),\n      goBack: () => this.setState({ view: 'overview', sel: null }),\n      totalFmt: this.eur(Math.round(total)),\n      dayPctFmt: this.pct(Math.abs(dayChange / total * 100)),\n      dayChangeFmt: (dayChange >= 0 ? '+' : '−') + this.eur(Math.abs(Math.round(dayChange))).slice(1) + ' €',\n      dayColor: dayChange >= 0 ? GREEN : RED,\n      rangeLabel: R.label, rangePctFmt: this.pct(R.pct, true),\n      rangeBtns, chartPath, areaPath: chartPath + ' L1080 170 L0 170 Z',\n      axisLabels: this.axisLabels(this.state.range).map(l => ({ label: l })),\n      holdings, movers, alloc, suggestions, det: det || {}, watchlist,\n      watchQ: this.state.q,\n      onWatchQ: (e) => this.setState({ q: e.target.value }),\n      onWatchKey: (e) => { if (e.key === 'Enter') addWatch(); },\n      addWatch,\n      removeWatch: (t) => this.setState({ watch: this.state.watch.filter(w => w.ticker !== t) }),\n      sortByWeight: () => this.setState({ sort: 'weight' }),\n      sortByDay: () => this.setState({ sort: 'day' }),\n      sortWeightColor: this.state.sort === 'weight' ? '#3FE0B0' : '#5E685C',\n      sortDayColor: this.state.sort === 'day' ? '#3FE0B0' : '#5E685C'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
